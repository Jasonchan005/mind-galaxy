<body>
  <!-- Header -->
  <div id="header">
    <h1>🌌 Mind-Galaxy</h1>
    <div class="header-actions">
      <button onclick="toggleView()" id="viewToggle">🌐 3D View</button>
      <button onclick="showExportModal()">📥 Export</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button onclick="addRootChild()" title="Add Node">➕</button>
    <button onclick="deleteSelected()" title="Delete">🗑️</button>
    <button onclick="collapseAll()" title="Collapse All">📂</button>
    <button onclick="expandAll()" title="Expand All">📖</button>
  </div>

  <!-- 2D Canvas -->
  <canvas id="mapCanvas"></canvas>
  
  <!-- 3D Container -->
  <div id="threeContainer"></div>

  <!-- Input Panel -->
  <div id="inputPanel">
    <textarea id="inputText" placeholder="Paste text to auto-generate a mind map...">Elon Musk founded Tesla and SpaceX. Tesla launched Model 3. SpaceX developed Starship.</textarea>
    <button onclick="generateFromInput()">🚀 Generate</button>
  </div>

  <!-- Node Editor -->
  <div id="nodeEditor">
    <input id="nodeEditorInput" placeholder="Node label..." maxlength="30">
    <div class="actions">
      <button class="save" onclick="saveNodeEdit()">Save</button>
      <button class="add-child" onclick="addChildFromEditor()">+ Child</button>
      <button class="delete" onclick="deleteNodeEdit()">Delete</button>
    </div>
  </div>

  <!-- Export Modal -->
  <div id="exportModal">
    <div class="modal">
      <h3>📥 Export Mind Map</h3>
      <div class="formats" id="exportFormats">
        <div class="format-btn active" data-format="png" onclick="selectFormat('png')">🖼️ PNG Image</div>
        <div class="format-btn" data-format="jpg" onclick="selectFormat('jpg')">🖼️ JPG Image</div>
        <div class="format-btn" data-format="pdf" onclick="selectFormat('pdf')">📄 PDF Document</div>
        <div class="format-btn" data-format="docx" onclick="selectFormat('docx')">📝 Word Document</div>
      </div>
      <div class="export-actions">
        <button class="do-export" onclick="doExport()">Download</button>
        <button class="cancel" onclick="hideExportModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="tagline">Mind-Galaxy by JCS Labs</div>

  <script>
    // ─── Tree Data ──────────────────────────────────────────
    let treeData = { id: 'root', label: '📄 Source', children: [], x: 0, y: 0 };
    let selectedNodeId = null;
    let nodeIdCounter = 1;
    let viewMode = '2d'; // '2d' or '3d'
    let threeJsLoaded = false;
    
    // ─── Canvas Setup ───────────────────────────────────────
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    let canvasOffset = { x: 0, y: 0 };
    let isDragging = false;
    let dragStart = null;
    let scale = 1;
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight - 50;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    // ─── Tree Rendering ─────────────────────────────────────
    function renderTree() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const rootX = canvas.width / 2 + canvasOffset.x;
      const rootY = 60 + canvasOffset.y;
      
      drawNode(treeData, rootX, rootY, 0, 0);
    }
    
    function drawNode(node, x, y, level, index) {
      const isSelected = node.id === selectedNodeId;
      const nodeW = Math.max(80, node.label.length * 9 + 20);
      const nodeH = 32;
      const hasChildren = node.children && node.children.length > 0;
      
      // Draw node background
      const grad = ctx.createRadialGradient(x, y, 0, x, y, nodeH);
      grad.addColorStop(0, isSelected ? '#7c3aed' : '#1e293b');
      grad.addColorStop(1, isSelected ? '#6d28d9' : '#0f172a');
      
      ctx.shadowColor = isSelected ? 'rgba(124,58,237,0.4)' : 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = isSelected ? 15 : 5;
      
      ctx.beginPath();
      ctx.roundRect(x - nodeW/2, y - nodeH/2, nodeW, nodeH, 8);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = isSelected ? '#a78bfa' : '#334155';
      ctx.lineWidth = isSelected ? 2 : 1;
      ctx.stroke();
      
      ctx.shadowBlur = 0;
      
      // Draw label
      ctx.fillStyle = '#e2e8f0';
      ctx.font = '13px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(node.label, x, y);
      
      // Draw expand/collapse indicator
      if (hasChildren) {
        ctx.fillStyle = '#64748b';
        ctx.font = '10px sans-serif';
        ctx.fillText(node.expanded ? '−' : '+', x + nodeW/2 - 5, y);
      }
      
      // Draw children
      if (hasChildren && node.expanded !== false) {
        const childSpacing = Math.min(120, 400 / (node.children.length + 1));
        const startY = y + 60;
        const totalH = (node.children.length - 1) * childSpacing;
        const firstY = y + 60 - totalH / 2;
        
        node.children.forEach((child, i) => {
          const childY = firstY + i * childSpacing;
          const childX = x + 180;
          
          // Draw connection line
          ctx.beginPath();
          ctx.moveTo(x + nodeW/2, y);
          ctx.lineTo(childX - 40, y);
          ctx.lineTo(childX - 40, childY);
          ctx.lineTo(childX - nodeW/2, childY);
          ctx.strokeStyle = 'rgba(124,58,237,0.3)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          
          // Draw relation label if exists
          if (child.relation) {
            ctx.fillStyle = '#a78bfa';
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(child.relation, x + nodeW/2 + 90, (y + childY) / 2 - 5);
          }
          
          drawNode(child, childX, childY, level + 1, i);
        });
      }
    }
    
    // ─── Interaction ────────────────────────────────────────
    let hoveredNode = null;
    
    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      
      const hit = hitTest(treeData, mx, my, canvas.width / 2 + canvasOffset.x, 60 + canvasOffset.y, 0);
      
      if (hit) {
        selectedNodeId = hit.id;
        renderTree();
        showNodeEditor(hit, e.clientX, e.clientY);
      } else {
        selectedNodeId = null;
        hideNodeEditor();
        isDragging = true;
        dragStart = { x: e.clientX, y: e.clientY };
        renderTree();
      }
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (isDragging && dragStart) {
        canvasOffset.x += (e.clientX - dragStart.x) * 0.5;
        canvasOffset.y += (e.clientY - dragStart.y) * 0.5;
        dragStart = { x: e.clientX, y: e.clientY };
        renderTree();
      }
    });
    
    canvas.addEventListener('mouseup', () => {
      isDragging = false;
      dragStart = null;
    });
    
    canvas.addEventListener('dblclick', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const hit = hitTest(treeData, mx, my, canvas.width / 2 + canvasOffset.x, 60 + canvasOffset.y, 0);
      
      if (hit && hit.children && hit.children.length > 0) {
        hit.expanded = hit.expanded === false ? true : false;
        renderTree();
      }
    });
    
    function hitTest(node, mx, my, x, y, level) {
      const nodeW = Math.max(80, node.label.length * 9 + 20);
      const nodeH = 32;
      
      if (mx >= x - nodeW/2 && mx <= x + nodeW/2 && my >= y - nodeH/2 && my <= y + nodeH/2) {
        return node;
      }
      
      if (node.children && node.expanded !== false) {
        const childSpacing = Math.min(120, 400 / (node.children.length + 1));
        const totalH = (node.children.length - 1) * childSpacing;
        const firstY = y + 60 - totalH / 2;
        
        for (let i = 0; i < node.children.length; i++) {
          const child = node.children[i];
          const childY = firstY + i * childSpacing;
          const childX = x + 180;
          const result = hitTest(child, mx, my, childX, childY, level + 1);
          if (result) return result;
        }
      }
      
      return null;
    }
    
    // ─── Node Editor ────────────────────────────────────────
    function showNodeEditor(node, cx, cy) {
      const editor = document.getElementById('nodeEditor');
      document.getElementById('nodeEditorInput').value = node.label;
      editor.style.display = 'block';
      editor.style.left = Math.min(cx, window.innerWidth - 240) + 'px';
      editor.style.top = Math.min(cy, window.innerHeight - 180) + 'px';
      editor.dataset.nodeId = node.id;
      document.getElementById('nodeEditorInput').focus();
      document.getElementById('nodeEditorInput').select();
    }
    
    function hideNodeEditor() {
      document.getElementById('nodeEditor').style.display = 'none';
    }
    
    function findNode(id, node) {
      if (node.id === id) return node;
      if (node.children) {
        for (const child of node.children) {
          const result = findNode(id, child);
          if (result) return result;
        }
      }
      return null;
    }
    
    function findParent(id, node) {
      if (node.children) {
        for (const child of node.children) {
          if (child.id === id) return node;
          const result = findParent(id, child);
          if (result) return result;
        }
      }
      return null;
    }
    
    window.saveNodeEdit = function() {
      const id = document.getElementById('nodeEditor').dataset.nodeId;
      const label = document.getElementById('nodeEditorInput').value.trim();
      if (!label) return;
      const node = findNode(id, treeData);
      if (node) {
        node.label = label;
        renderTree();
        trackEvent('edit_node', { tool: 'mindgalaxy' });
      }
      hideNodeEditor();
    };
    
    window.addChildFromEditor = function() {
      const id = document.getElementById('nodeEditor').dataset.nodeId;
      const node = findNode(id, treeData);
      if (node) {
        nodeIdCounter++;
        if (!node.children) node.children = [];
        node.children.push({ id: 'n' + nodeIdCounter, label: 'New Node', children: [], expanded: true });
        node.expanded = true;
        renderTree();
        trackEvent('add_child', { tool: 'mindgalaxy' });
      }
      hideNodeEditor();
    };
    
    window.deleteNodeEdit = function() {
      const id = document.getElementById('nodeEditor').dataset.nodeId;
      if (id === 'root') return;
      const parent = findParent(id, treeData);
      if (parent) {
        parent.children = parent.children.filter(c => c.id !== id);
        renderTree();
        trackEvent('delete_node', { tool: 'mindgalaxy' });
      }
      hideNodeEditor();
    };
    
    // ─── Toolbar Actions ────────────────────────────────────
    window.addRootChild = function() {
      nodeIdCounter++;
      if (!treeData.children) treeData.children = [];
      treeData.children.push({ id: 'n' + nodeIdCounter, label: 'New Node', children: [], expanded: true });
      treeData.expanded = true;
      renderTree();
      trackEvent('add_root_child', { tool: 'mindgalaxy' });
    };
    
    window.deleteSelected = function() {
      if (!selectedNodeId || selectedNodeId === 'root') return;
      const parent = findParent(selectedNodeId, treeData);
      if (parent) {
        parent.children = parent.children.filter(c => c.id !== selectedNodeId);
        selectedNodeId = null;
        hideNodeEditor();
        renderTree();
        trackEvent('delete_selected', { tool: 'mindgalaxy' });
      }
    };
    
    window.collapseAll = function() {
      function collapse(node) {
        if (node.children && node.children.length > 0) {
          node.expanded = false;
          node.children.forEach(collapse);
        }
      }
      treeData.expanded = true;
      treeData.children.forEach(collapse);
      renderTree();
    };
    
    window.expandAll = function() {
      function expand(node) {
        node.expanded = true;
        if (node.children) node.children.forEach(expand);
      }
      expand(treeData);
      renderTree();
    };
    
    // ─── Export ─────────────────────────────────────────────
    let exportFormat = 'png';
    
    window.showExportModal = function() {
      document.getElementById('exportModal').classList.add('show');
    };
    window.hideExportModal = function() {
      document.getElementById('exportModal').classList.remove('show');
    };
    window.selectFormat = function(fmt) {
      exportFormat = fmt;
      document.querySelectorAll('.format-btn').forEach(b => b.classList.toggle('active', b.dataset.format === fmt));
    };
    
    window.doExport = function() {
      hideExportModal();
      
      if (exportFormat === 'png') {
        const link = document.createElement('a');
        link.download = 'mind-galaxy.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      } else if (exportFormat === 'jpg') {
        const link = document.createElement('a');
        link.download = 'mind-galaxy.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
      } else if (exportFormat === 'pdf') {
        exportPDF();
      } else if (exportFormat === 'docx') {
        exportDocx();
      }
      trackEvent('export_' + exportFormat, { tool: 'mindgalaxy' });
    };
    
    function exportPDF() {
      // Use canvas to PDF via window print or jsPDF
      const imgData = canvas.toDataURL('image/png');
      const win = window.open('', '_blank');
      win.document.write(`
        <html><head><title>Mind-Galaxy</title>
        <style>body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;}img{max-width:100%;max-height:100%;}</style>
        </head><body><img src="${imgData}" onload="window.print()"></body></html>
      `);
      win.document.close();
    }
    
    function exportDocx() {
      // Generate DOCX using a simple HTML-to-DOCX approach
      const treeText = flattenTree(treeData, 0);
      const html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' 
        xmlns:w='urn:schemas-microsoft-com:office:word' 
        xmlns='http://www.w3.org/TR/REC-html40'>
        <head><meta charset="utf-8"><title>Mind-Galaxy</title>
        <style>body{font-family:Inter,sans-serif;padding:20px;}
        h1{color:#7c3aed;font-size:18px;}
        .level0{margin-left:0;font-weight:bold;font-size:16px;margin-top:16px;}
        .level1{margin-left:24px;font-size:14px;margin-top:8px;}
        .level2{margin-left:48px;font-size:13px;margin-top:4px;color:#555;}
        .level3{margin-left:72px;font-size:12px;margin-top:4px;color:#777;}
        .rel{color:#7c3aed;font-size:11px;margin-left:24px;}
        </style></head><body>
        <h1>🌌 Mind-Galaxy Mind Map</h1>
        ${treeText}
        <p style="margin-top:40px;color:#999;font-size:10px;">Generated by Mind-Galaxy</p>
        </body></html>`;
      
      const blob = new Blob([html], { type: 'application/msword' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = 'mind-galaxy.doc';
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
    }
    
    function flattenTree(node, level) {
      if (!node || node.id === 'root' && level === 0) {
        let html = '';
        if (node.children) {
          node.children.forEach(child => {
            html += flattenTree(child, level + 1);
          });
        }
        return html;
      }
      
      let html = `<div class="level${Math.min(level, 3)}">• ${node.label}</div>`;
      if (node.relation) {
        html += `<div class="rel">↳ ${node.relation}</div>`;
      }
      if (node.children && node.expanded !== false) {
        node.children.forEach(child => {
          html += flattenTree(child, level + 1);
        });
      }
      return html;
    }
    
    window.exportImage = function() {
      showExportModal();
    };
    
    // ─── AI Generation ──────────────────────────────────────
    window.generateFromInput = function() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) return;
      
      // Simple tree generator from text
      const sentences = text.split(/[。！？\n.!?]+/).filter(s => s.trim().length > 5);
      
      // Reset tree
      treeData = { id: 'root', label: '📄 Source', children: [], x: 0, y: 0, expanded: true };
      nodeIdCounter = 0;
      
      const actionVerbs = ['founded','created','launched','developed','built','acquired','invested','partnered','announced','released','introduced','unveiled','published','discovered','invented','designed','led','managed','started','ended','won','lost','beat','joined','left','hired','fired','approved','rejected','proposed','announced'];
      
      const cnVerbs = ['发布','推出','收购','投资','合作','竞争','宣布','创建','发明','发现','开发','设计','领导','管理','开始','结束','打败','赢得','加入','离开','任命','开除','批准','拒绝','提出'];
      
      for (const sentence of sentences) {
        // Try to find verb and split into subject/verb/object
        const trimmed = sentence.trim();
        const words = trimmed.split(/[\s,，、]+/).filter(w => w.length > 0);
        
        let foundVerb = null;
        let verbIdx = -1;
        
        for (let i = 0; i < words.length; i++) {
          const w = words[i].toLowerCase().replace(/[^a-zA-Z\u4e00-\u9fff]/g, '');
          if (actionVerbs.includes(w) || cnVerbs.includes(w)) {
            foundVerb = w;
            verbIdx = i;
            break;
          }
        }
        
        if (foundVerb !== null && verbIdx > 0 && verbIdx < words.length - 1) {
          const subj = words.slice(0, verbIdx).join(' ').replace(/[^a-zA-Z\u4e00-\u9fff\s]/g, '').trim();
          const obj = words.slice(verbIdx + 1).join(' ').replace(/[^a-zA-Z\u4e00-\u9fff\s]/g, '').trim();
          
          if (subj && obj) {
            // Find or create subject node
            let subjNode = treeData.children.find(c => c.label.toLowerCase() === subj.toLowerCase());
            if (!subjNode) {
              nodeIdCounter++;
              subjNode = { id: 'n' + nodeIdCounter, label: subj, children: [], expanded: true };
              treeData.children.push(subjNode);
            }
            
            // Create object node as child of subject
            nodeIdCounter++;
            subjNode.children.push({ 
              id: 'n' + nodeIdCounter, 
              label: obj, 
              children: [], 
              expanded: true,
              relation: foundVerb
            });
          }
        } else {
          // No verb found — use first capitalized words as entities
          const entities = trimmed.match(/\b[A-Z][a-z]+(?:\s[A-Z][a-z]+)*/g) || [];
          if (entities.length > 0) {
            const mainEntity = entities[0];
            let entityNode = treeData.children.find(c => c.label === mainEntity);
            if (!entityNode) {
              nodeIdCounter++;
              entityNode = { id: 'n' + nodeIdCounter, label: mainEntity, children: [], expanded: true };
              treeData.children.push(entityNode);
            }
            for (let j = 1; j < entities.length; j++) {
              nodeIdCounter++;
              entityNode.children.push({ id: 'n' + nodeIdCounter, label: entities[j], children: [], expanded: true, relation: 'related' });
            }
          }
        }
      }
      
      renderTree();
      trackEvent('generate_tree', { tool: 'mindgalaxy' });
    };
    
    // ─── View Toggle ────────────────────────────────────────
    window.toggleView = function() {
      if (viewMode === '2d') {
        viewMode = '3d';
        canvas.style.display = 'none';
        document.getElementById('threeContainer').style.display = 'block';
        document.getElementById('viewToggle').textContent = '🌲 Tree View';
        document.getElementById('viewToggle').classList.add('active');
        loadThreeView();
      } else {
        viewMode = '2d';
        canvas.style.display = 'block';
        document.getElementById('threeContainer').style.display = 'none';
        document.getElementById('viewToggle').textContent = '🌐 3D View';
        document.getElementById('viewToggle').classList.remove('active');
      }
    };
    
    function loadThreeView() {
      // Load Three.js dynamically
      const container = document.getElementById('threeContainer');
      container.innerHTML = '<iframe src="/index-3d-backup.html" style="width:100%;height:100%;border:none;"></iframe>';
    }
    
    // ─── Keyboard Shortcuts ─────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideNodeEditor();
      if (e.key === 'Enter' && document.getElementById('nodeEditor').style.display === 'block') {
        saveNodeEdit();
      }
      if (e.key === 'Tab') {
        e.preventDefault();
        // Indent/outdent could be added
      }
    });
    
    // ─── Init ───────────────────────────────────────────────
    renderTree();
  </script>
</body>
