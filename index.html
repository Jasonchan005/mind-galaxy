  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(15, 10, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.prepend(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.prepend(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = false;
    controls.target.set(0, 0, 0);
    controls.maxPolarAngle = Math.PI / 2;

    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);
    const backLight = new THREE.DirectionalLight(0x7c3aed, 0.5);
    backLight.position.set(-10, -5, -10);
    scene.add(backLight);

    // Stars
    const starsGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(2000 * 3);
    for (let i = 0; i < 2000 * 3; i++) starPos[i] = (Math.random() - 0.5) * 200;
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starsMat = new THREE.PointsMaterial({ color: 0x7c3aed, size: 0.1, transparent: true, opacity: 0.6 });
    scene.add(new THREE.Points(starsGeo, starsMat));

    let graphGroup = new THREE.Group();
    scene.add(graphGroup);

    const KNOWN = {
      '特斯拉': '#f59e0b', '比亚迪': '#22c55e', '马斯克': '#ef4444',
      '苹果': '#a855f7', '苹果公司': '#a855f7', '三星': '#3b82f6',
      '谷歌': '#22c55e', '华为': '#ef4444', '高通': '#06b6d4',
      '丰田': '#f59e0b', '大众': '#3b82f6', '奔驰': '#22c55e',
      '宝马': '#3b82f6', '蔚来': '#22c55e', '小鹏': '#3b82f6',
      '理想': '#f59e0b', 'Waymo': '#a855f7', 'Cruise': '#ef4444',
      'OpenAI': '#22c55e', 'Microsoft': '#3b82f6', 'Google': '#22c55e',
      'Amazon': '#f59e0b', 'Meta': '#3b82f6', 'Twitter': '#3b82f6',
      '拜登': '#3b82f6', '特朗普': '#ef4444', '普京': '#ef4444',
      '习近平': '#ef4444', '美联储': '#f59e0b', '国会': '#3b82f6',
      'Model 3': '#f59e0b', 'iPhone': '#a855f7', 'Android': '#22c55e',
    };

    const VERBS = ['发布','推出','收购','投资','合作','竞争','反对','支持','宣布','降价','涨价','起诉','辞职','当选','任命','研发','launch','acquire','invest','partner','compete','announce','cut','raise','sue','resign','elect','appoint'];

    // ─── AI-Powered Entity Extraction via Hugging Face ────
    // Uses free inference API — no API key needed (rate limited)
    const HF_API = 'https://api-inference.huggingface.co/models/';
    
    // NER model for entity extraction
    async function extractWithHF(text) {
      // Try English NER model first
      try {
        const resp = await fetch(HF_API + 'dslim/bert-base-NER', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ inputs: text.substring(0, 1000) }),
          signal: AbortSignal.timeout(10000)
        });
        if (!resp.ok) throw new Error('HF API error');
        const data = await resp.json();
        return data;
      } catch(e) {
        // Fallback to zero-shot classification
        try {
          const resp = await fetch(HF_API + 'facebook/bart-large-mnli', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              inputs: text.substring(0, 500),
              parameters: { candidate_labels: ['person', 'organization', 'product', 'event', 'technology', 'country', 'brand', 'concept'] }
            }),
            signal: AbortSignal.timeout(10000)
          });
          if (!resp.ok) throw new Error('HF fallback error');
          return await resp.json();
        } catch(e2) {
          return null;
        }
      }
    }

    // Extract entities using Hugging Face + fallback
    async function extractEntities(text) {
      const hfResult = await extractWithHF(text);
      
      if (hfResult && Array.isArray(hfResult)) {
        // NER model returned entity tags
        const entities = [];
        const seen = new Set();
        const colors = ['#f59e0b','#22c55e','#3b82f6','#a855f7','#ef4444','#06b6d4','#ec4899','#14b8a6'];
        
        for (const item of hfResult) {
          const word = item.word || item.entity_group || '';
          const clean = word.replace(/[#\u2581]/g, '').trim();
          if (clean.length > 1 && !seen.has(clean.toLowerCase())) {
            seen.add(clean.toLowerCase());
            const color = item.entity_group === 'PER' || item.entity_group === 'person' ? '#ef4444' :
                          item.entity_group === 'ORG' || item.entity_group === 'organization' ? '#3b82f6' :
                          item.entity_group === 'LOC' || item.entity_group === 'location' ? '#22c55e' :
                          item.entity_group === 'MISC' ? '#a855f7' : colors[entities.length % colors.length];
            entities.push({ id: clean, label: clean, color });
          }
        }
        if (entities.length >= 2) return entities.slice(0, 12);
      }
      
      if (hfResult && hfResult.labels) {
        // Zero-shot classification result
        return hfResult.labels.slice(0, 6).map((label, i) => {
          const colors = ['#f59e0b','#22c55e','#3b82f6','#a855f7','#ef4444','#06b6d4'];
          return { id: label, label, color: colors[i] };
        });
      }
      
      // Final fallback: regex extraction
      return fallbackExtract(text);
    }

    function fallbackExtract(text) {
      // Try KNOWN dictionary
      const found = Object.keys(KNOWN).filter(k => text.includes(k));
      if (found.length > 0) {
        return found.map(name => ({ id: name, label: name, color: KNOWN[name] }));
      }
      
      // Regex fallback
      const enWords = text.match(/\b[A-Z][a-z]+(?:\s[A-Z][a-z]+)*\b/g) || [];
      const cnWords = text.match(/[\u4e00-\u9fff]{2,4}/g) || [];
      const stopWords = ['this','that','with','from','they','have','been','will','their','about','would','could','should','after','before','between','没有','什么','可以','一个','这个','那个','我们','他们','你们','因为','所以','但是','如果'];
      const all = [...new Set([...enWords, ...cnWords])].filter(w => !stopWords.includes(w) && w.length > 1);
      
      if (all.length > 0) {
        const colors = ['#f59e0b','#22c55e','#3b82f6','#a855f7','#ef4444','#06b6d4'];
        return all.slice(0, 8).map((w, i) => ({ id: w, label: w, color: colors[i % colors.length] }));
      }
      
      return [];
    }

    function extractRelations(text, entities) {
      const edges = [];
      const entityIds = entities.map(e => e.id);
      
      VERBS.forEach(v => {
        let idx = text.indexOf(v);
        while (idx !== -1) {
          const before = text.substring(Math.max(0, idx - 40), idx);
          const after = text.substring(idx + v.length, idx + v.length + 40);
          const subj = entityIds.find(e => before.includes(e));
          const obj = entityIds.find(e => after.includes(e));
          if (subj && obj && subj !== obj) {
            if (!edges.find(e => e.from === subj && e.to === obj)) {
              edges.push({ from: subj, to: obj, label: v });
            }
          }
          idx = text.indexOf(v, idx + 1);
        }
      });
      
      if (edges.length === 0 && entities.length > 0) {
        entities.forEach(e => edges.push({ from: 'root', to: e.id }));
      }
      
      return edges;
    }

    async function extractGraph(text) {
      const entities = await extractEntities(text);
      const edges = extractRelations(text, entities);
      const nodes = [{ id: 'root', label: '📄 Source', color: '#7c3aed' }, ...entities];
      return { nodes, edges };
    }

    window.generateGraph = async function() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) return;
      
      // Show loading state
      document.getElementById('generateBtn').textContent = '⏳ Analyzing...';
      document.getElementById('generateBtn').disabled = true;
      
      await generateFromText(text);
      
      document.getElementById('generateBtn').textContent = '🚀 Generate Graph';
      document.getElementById('generateBtn').disabled = false;
      trackEvent('generate', { source: 'text', tool: 'galaxymind' });
    };

    async function generateFromText(text) {
      while(graphGroup.children.length) graphGroup.remove(graphGroup.children[0]);

      const { nodes, edges } = await extractGraph(text);
      const nodeMap = {};
      const positions = [];
      const sphereRadius = 6;
      const nonRoot = nodes.filter(n => n.id !== 'root');
      const total = nonRoot.length;

      const goldenRatio = (1 + Math.sqrt(5)) / 2;
      nonRoot.forEach((n, i) => {
        const theta = 2 * Math.PI * i / goldenRatio;
        const phi = Math.acos(1 - 2 * (i + 0.5) / total);
        const r = sphereRadius;
        const pos = { x: r * Math.sin(phi) * Math.cos(theta), y: r * Math.sin(phi) * Math.sin(theta), z: r * Math.cos(phi) };
        positions.push(pos);
        nodeMap[n.id] = { ...n, pos };
      });

      if (nodes.find(n => n.id === 'root')) {
        positions.unshift({ x: 0, y: 0, z: 0 });
        nodeMap['root'] = { id: 'root', label: '📄 Source', color: '#7c3aed', pos: { x: 0, y: 0, z: 0 } };
      }

      // Ring
      const ringPts = [];
      for (let i = 0; i <= 60; i++) {
        const a = (i / 60) * Math.PI * 2;
        ringPts.push(new THREE.Vector3(sphereRadius * Math.cos(a), sphereRadius * Math.sin(a), 0));
      }
      const ring = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(ringPts),
        new THREE.LineBasicMaterial({ color: 0x7c3aed, transparent: true, opacity: 0.12 })
      );
      graphGroup.add(ring);

      // Nodes
      nodes.forEach((n, i) => {
        const pos = positions[i];
        if (!pos) return;
        const color = new THREE.Color(n.color);
        const dot = new THREE.Mesh(
          new THREE.SphereGeometry(n.id === 'root' ? 0.3 : 0.15, 8, 8),
          new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.8 })
        );
        dot.position.set(pos.x, pos.y, pos.z);
        graphGroup.add(dot);

        const div = document.createElement('div');
        div.textContent = n.label;
        div.style.cssText = 'color:#cbd5e1;font-size:11px;font-weight:500;text-shadow:0 0 8px rgba(0,0,0,0.9);background:rgba(0,0,0,0.4);padding:2px 6px;border-radius:4px;pointer-events:none;';
        const label = new CSS2DObject(div);
        label.position.set(pos.x, pos.y - 0.5, pos.z);
        graphGroup.add(label);
      });

      // Edges
      edges.forEach(e => {
        const from = nodeMap[e.from], to = nodeMap[e.to];
        if (!from || !to) return;

        const mid = new THREE.Vector3(
          (from.pos.x + to.pos.x) / 2, (from.pos.y + to.pos.y) / 2, (from.pos.z + to.pos.z) / 2
        );
        const mLen = Math.sqrt(mid.x*mid.x + mid.y*mid.y + mid.z*mid.z);
        if (mLen > 0.1) { mid.x *= 0.5/mLen; mid.y *= 0.5/mLen; mid.z *= 0.5/mLen; }

        const curve = new THREE.QuadraticBezierCurve3(
          new THREE.Vector3(from.pos.x, from.pos.y, from.pos.z),
          mid,
          new THREE.Vector3(to.pos.x, to.pos.y, to.pos.z)
        );

        const line = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints(curve.getPoints(30)),
          new THREE.LineBasicMaterial({ color: 0x7c3aed, transparent: true, opacity: 0.35 })
        );
        graphGroup.add(line);

        const particle = new THREE.Mesh(
          new THREE.SphereGeometry(0.08, 6, 6),
          new THREE.MeshBasicMaterial({ color: 0xc4b5fd, transparent: true, opacity: 0.9 })
        );
        const c = curve.clone();
        particle.userData = { curve: c, t: Math.random(), speed: 0.003 + Math.random() * 0.004 };
        particle.position.copy(c.getPoint(particle.userData.t));
        graphGroup.add(particle);

        if (e.label) {
          const cm = curve.getPoint(0.5);
          const d = document.createElement('div');
          d.textContent = e.label;
          d.style.cssText = 'color:#c4b5fd;font-size:10px;font-weight:500;background:rgba(15,15,35,0.7);padding:1px 5px;border-radius:3px;border:1px solid rgba(167,139,250,0.2);';
          const l = new CSS2DObject(d);
          l.position.copy(cm);
          graphGroup.add(l);
        }
      });
    }

    // ─── Animation ──────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      graphGroup.children.forEach(child => {
        if (child.userData && child.userData.curve) {
          child.userData.t += child.userData.speed;
          if (child.userData.t > 1) child.userData.t = 0;
          child.position.copy(child.userData.curve.getPoint(child.userData.t));
        }
      });
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Tab Switching ──────────────────────────────────────
    window.switchTab = function(tab) {
      document.querySelectorAll('.input-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      ['text','url','file'].forEach(t => document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab));
    };

    // ─── Examples ───────────────────────────────────────────
    window.loadExample = function(idx) {
      const examples = [
        '',
        `Elon Musk announced Tesla's new self-driving system. Tesla shares rose 5% after the announcement. Competitors like Waymo and Cruise are also developing autonomous driving technology. Google and Apple are also working on self-driving cars.`,
        `Microsoft announced a $10 billion investment in OpenAI. Google responded with its own AI initiative. Amazon and Meta are also competing in the AI space.`,
        `特斯拉宣布 Model 3 降价 20%。比亚迪跟进降价 15%。小鹏汽车表示不会降价。马斯克表示这是为了应对竞争。分析师认为这会影响整个行业。`,
        `President Biden announced new climate policies. Former President Trump criticized the plan. Congress is divided on the issue. The Federal Reserve warned about economic impacts.`
      ];
      document.getElementById('inputText').value = examples[idx];
      switchTab('text');
      generateGraph();
    };

    // ─── URL Fetch ──────────────────────────────────────────
    window.fetchUrl = function() {
      const url = document.getElementById('inputUrl').value.trim();
      if (!url) return;
      // Use CORS proxy
      const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
      document.getElementById('inputUrl').placeholder = 'Fetching...';
      
      fetch(proxyUrl)
        .then(r => r.json())
        .then(data => {
          const html = data.contents;
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          // Get main content
          const article = doc.querySelector('article') || doc.querySelector('main') || doc.querySelector('body');
          const text = article ? article.textContent.substring(0, 3000) : 'Could not extract content.';
          document.getElementById('inputText').value = text;
          switchTab('text');
          generateGraph();
          document.getElementById('inputUrl').placeholder = 'Paste a news/article URL...';
          trackEvent('fetch_url', { tool: 'galaxymind' });
        })
        .catch(() => {
          document.getElementById('inputUrl').placeholder = 'Failed to fetch. Try pasting text directly.';
        });
    };

    // ─── File Upload ────────────────────────────────────────
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      document.getElementById('fileStatus').textContent = '📎 ' + file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';
    });

    window.processFile = function() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return;
      
      const reader = new FileReader();
      const ext = file.name.split('.').pop().toLowerCase();

      if (ext === 'pdf') {
        reader.onload = async function(e) {
          const data = new Uint8Array(e.target.result);
          const pdf = await pdfjsLib.getDocument({ data }).promise;
          let text = '';
          for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            text += content.items.map(s => s.str).join(' ') + '\n';
          }
          document.getElementById('inputText').value = text.substring(0, 5000);
          switchTab('text');
          generateGraph();
          trackEvent('upload_pdf', { tool: 'galaxymind' });
        };
        reader.readAsArrayBuffer(file);
      } else if (ext === 'docx') {
        reader.onload = function(e) {
          // For DOCX, use simple text extraction via JSZip-like approach
          // Since we can't use mammoth easily, show instructions
          document.getElementById('inputText').value = 'DOCX file loaded: ' + file.name + '\nPlease copy the text manually for now. DOCX parsing coming soon.';
          switchTab('text');
          generateGraph();
        };
        reader.readAsText(file);
      }
      document.getElementById('fileStatus').textContent = 'Processing...';
    };

    // ─── Auto-generate on load ──────────────────────────────
    setTimeout(generateGraph, 300);
  </script>
</body>
</html>
