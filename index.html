<body>

<script>
// ─── Core Data ──────────────────────────────────────────
var root = {id:'r', label:'Source', children:[], expanded:true};
var selected = null;
var nid = 0;
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var offX = 0, offY = 0;
var dragging = false;
var dragX = 0, dragY = 0;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 50;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ─── Draw Tree (XMind-style radial layout) ────────────
function drawTree() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  var cx = canvas.width / 2 + offX;
  var cy = canvas.height / 2 + offY + 25;
  
  // Skip root node — draw children directly as top-level nodes
  if (root.children && root.expanded !== false) {
    var n = root.children.length;
    for (var i = 0; i < n; i++) {
      var angle = -Math.PI / 2 + (i / n) * Math.PI * 2;
      var radius = 100;
      var childX = cx + radius * Math.cos(angle);
      var childY = cy + radius * Math.sin(angle);
      
      // Draw line from center
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.quadraticCurveTo((cx+childX)/2, (cy+childY)/2, childX, childY);
      ctx.strokeStyle = 'rgba(124,58,237,0.2)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      
      var childArc = Math.PI * 2 / n;
      var childStart = -Math.PI / 2 + (i / n) * Math.PI * 2;
      drawNodeRadial(root.children[i], childX, childY, 1, childStart, childArc);
    }
  }
}

function drawNodeRadial(node, x, y, level, startAngle, arcSpan) {
  if (!node) return;
  var w = Math.max(70, node.label.length * 8 + 24);
  var h = 30;
  var isSel = node.id === selected;
  var hasKids = node.children && node.children.length > 0;

  // Draw node
  ctx.shadowColor = isSel ? 'rgba(124,58,237,0.4)' : 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = isSel ? 12 : 4;

  ctx.beginPath();
  ctx.roundRect(x - w/2, y - h/2, w, h, 7);
  var grad = ctx.createRadialGradient(x, y, 0, x, y, h);
  grad.addColorStop(0, isSel ? '#7c3aed' : '#1e293b');
  grad.addColorStop(1, isSel ? '#6d28d9' : '#0f172a');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = isSel ? '#a78bfa' : '#334155';
  ctx.lineWidth = isSel ? 2 : 1;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Label
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '13px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(node.label, x, y);

  // +/- indicator
  if (hasKids) {
    ctx.fillStyle = '#64748b';
    ctx.font = '11px sans-serif';
    ctx.fillText(node.expanded === false ? '+' : '-', x + w/2 - 4, y);
  }

  // Draw children in radial layout
  if (hasKids && node.expanded !== false) {
    var n = node.children.length;
    var radius = Math.max(130, level * 30 + 100);
    
    // For root, spread children evenly around full circle
    // For children, spread in their arc section
    var totalArc = level === 0 ? Math.PI * 2 : arcSpan * 0.7;
    var startA = level === 0 ? -Math.PI / 2 : startAngle + arcSpan * 0.15;
    
    for (var i = 0; i < n; i++) {
      var child = node.children[i];
      var angle = startA + (i / n) * totalArc;
      var childX = x + radius * Math.cos(angle);
      var childY = y + radius * Math.sin(angle);
      
      // Draw line
      ctx.beginPath();
      ctx.moveTo(x + (w/2) * Math.cos(angle), y + (h/2) * Math.sin(angle));
      
      // Curve to child
      var cpX = (x + childX) / 2;
      var cpY = (y + childY) / 2;
      ctx.quadraticCurveTo(cpX, cpY, childX, childY);
      ctx.strokeStyle = 'rgba(124,58,237,0.25)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Relation label at midpoint
      if (child.rel) {
        ctx.fillStyle = '#a78bfa';
        ctx.font = '9px sans-serif';
        ctx.textAlign = 'center';
        var mx = (x + childX) / 2 + 10;
        var my = (y + childY) / 2 - 8;
        ctx.fillText(child.rel, mx, my);
      }

      // Recurse — each child gets its own arc section
      var childArc = totalArc / n;
      var childStart = startA + (i / n) * totalArc;
      drawNodeRadial(child, childX, childY, level + 1, childStart, childArc);
    }
  }
}

// ─── Hit Test (radial) ─────────────────────────────────
function hitTestRadial(node, mx, my, x, y, level, startAngle, arcSpan) {
  if (!node) return null;
  var w = Math.max(70, node.label.length * 8 + 24);
  var h = 30;
  if (mx >= x - w/2 && mx <= x + w/2 && my >= y - h/2 && my <= y + h/2) return node;
  
  if (node.children && node.expanded !== false) {
    var n = node.children.length;
    var radius = Math.max(130, level * 30 + 100);
    var totalArc = level === 0 ? Math.PI * 2 : arcSpan * 0.7;
    var startA = level === 0 ? -Math.PI / 2 : startAngle + arcSpan * 0.15;
    
    for (var i = 0; i < n; i++) {
      var angle = startA + (i / n) * totalArc;
      var childX = x + radius * Math.cos(angle);
      var childY = y + radius * Math.sin(angle);
      var childArc = totalArc / n;
      var childStart = startA + (i / n) * totalArc;
      var result = hitTestRadial(node.children[i], mx, my, childX, childY, level + 1, childStart, childArc);
      if (result) return result;
    }
  }
  return null;
}

// ─── Mouse Events ──────────────────────────────────────
canvas.addEventListener('mousedown', function(e) {
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var cx = canvas.width/2 + offX;
  var cy = canvas.height/2 + offY + 25;
  
  // Check top-level children directly
  var hit = null;
  if (root.children) {
    for (var i = 0; i < root.children.length; i++) {
      var angle = -Math.PI/2 + (i/root.children.length)*Math.PI*2;
      var childX = cx + 100*Math.cos(angle);
      var childY = cy + 100*Math.sin(angle);
      var childArc = Math.PI*2/root.children.length;
      var childStart = -Math.PI/2 + (i/root.children.length)*Math.PI*2;
      hit = hitTestRadial(root.children[i], mx, my, childX, childY, 1, childStart, childArc);
      if (hit) break;
    }
  }
  if (hit) {
    selected = hit.id;
    drawTree();
    showEditor(hit, e.clientX, e.clientY);
  } else {
    selected = null;
    hideEditor();
    dragging = true;
    dragX = e.clientX;
    dragY = e.clientY;
    drawTree();
  }
});

canvas.addEventListener('mousemove', function(e) {
  if (dragging) {
    offX += (e.clientX - dragX);
    offY += (e.clientY - dragY);
    dragX = e.clientX;
    dragY = e.clientY;
    drawTree();
  }
});

canvas.addEventListener('mouseup', function() { dragging = false; });
canvas.addEventListener('mouseleave', function() { dragging = false; });

canvas.addEventListener('dblclick', function(e) {
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var cx = canvas.width/2 + offX;
  var cy = canvas.height/2 + offY + 25;
  
  var hit = null;
  if (root.children) {
    for (var i = 0; i < root.children.length; i++) {
      var angle = -Math.PI/2 + (i/root.children.length)*Math.PI*2;
      var childX = cx + 100*Math.cos(angle);
      var childY = cy + 100*Math.sin(angle);
      var childArc = Math.PI*2/root.children.length;
      var childStart = -Math.PI/2 + (i/root.children.length)*Math.PI*2;
      hit = hitTestRadial(root.children[i], mx, my, childX, childY, 1, childStart, childArc);
      if (hit) break;
    }
  }
  if (hit && hit.children && hit.children.length > 0) {
    hit.expanded = hit.expanded === false ? true : false;
    drawTree();
  }
});

// ─── Editor ─────────────────────────────────────────────
function findNode(id, node) {
  if (node.id === id) return node;
  if (node.children) for (var i = 0; i < node.children.length; i++) {
    var r = findNode(id, node.children[i]); if (r) return r;
  }
  return null;
}

function findParent(id, node) {
  if (node.children) for (var i = 0; i < node.children.length; i++) {
    if (node.children[i].id === id) return node;
    var r = findParent(id, node.children[i]); if (r) return r;
  }
  return null;
}

function showEditor(node, cx, cy) {
  var ed = document.getElementById('editor');
  document.getElementById('edInp').value = node.label;
  ed.style.display = 'block';
  ed.style.left = Math.min(cx, window.innerWidth - 240) + 'px';
  ed.style.top = Math.min(cy, window.innerHeight - 160) + 'px';
  ed.dataset.id = node.id;
  document.getElementById('edInp').focus();
  document.getElementById('edInp').select();
}

function hideEditor() {
  document.getElementById('editor').style.display = 'none';
}

function saveEd() {
  var id = document.getElementById('editor').dataset.id;
  var label = document.getElementById('edInp').value.trim();
  if (!label) return;
  var node = findNode(id, root);
  if (node) { node.label = label; drawTree(); }
  hideEditor();
}

function addChild() {
  var id = document.getElementById('editor').dataset.id;
  var node = findNode(id, root);
  if (node) {
    nid++;
    if (!node.children) node.children = [];
    node.children.push({id:'n'+nid, label:'New', children:[], expanded:true});
    node.expanded = true;
    drawTree();
  }
  hideEditor();
}

function delNode() {
  var id = document.getElementById('editor').dataset.id;
  if (id === 'r') return;
  var parent = findParent(id, root);
  if (parent) {
    parent.children = parent.children.filter(function(c) { return c.id !== id; });
    selected = null;
    drawTree();
  }
  hideEditor();
}

// ─── Generate Tree from Text ───────────────────────────
function genTree() {
  var text = document.getElementById('txt').value.trim();
  if (!text) return;

  root = {id:'r', label:'Source', children:[], expanded:true};
  nid = 0;

  var sentences = text.split(/[.。！？\n!?]+/);
  var verbs = ['founded','created','launched','developed','built','acquired','invested','partnered','announced','released','introduced','unveiled','published','discovered','invented','designed','led','managed','started','ended','won','lost','joined','left','hired','fired','approved','rejected','proposed'];
  var cnVerbs = ['发布','推出','收购','投资','合作','竞争','宣布','创建','发明','发现','开发','设计','领导','管理','开始','结束','打败','赢得','加入','离开','任命','开除','批准','拒绝','提出'];

  for (var si = 0; si < sentences.length; si++) {
    var s = sentences[si].trim();
    if (s.length < 4) continue;

    // Split into words — handle both English and Chinese
    var words = s.split(/[\s,，、]+/);
    if (words.length <= 2 && /[\u4e00-\u9fff]/.test(s)) {
      // Chinese text: split by common verbs and punctuation
      var parts = s.split(/[，,、；;：:]/);
      if (parts.length > 1) {
        words = parts;
      } else {
        // Split by known verbs
        var splitWords = [];
        var remaining = s;
        var foundVerb = false;
        for (var vi = 0; vi < cnVerbs.length; vi++) {
          var vIdx = remaining.indexOf(cnVerbs[vi]);
          if (vIdx > 0) {
            splitWords.push(remaining.substring(0, vIdx));
            splitWords.push(cnVerbs[vi]);
            remaining = remaining.substring(vIdx + cnVerbs[vi].length);
            foundVerb = true;
            break;
          }
        }
        if (foundVerb && remaining.length > 0) {
          // Get object after verb
          var objMatch = remaining.match(/^了?([\u4e00-\u9fff]+)/);
          if (objMatch) splitWords.push(objMatch[1]);
          words = splitWords;
        }
      }
    }

    var verbIdx = -1;
    var verbWord = null;
    for (var wi = 0; wi < words.length; wi++) {
      var w = words[wi].toLowerCase().replace(/[^a-z\u4e00-\u9fff]/g, '');
      if (verbs.indexOf(w) >= 0 || cnVerbs.indexOf(w) >= 0) {
        verbIdx = wi;
        verbWord = words[wi];
        break;
      }
    }

    if (verbIdx > 0 && verbIdx < words.length - 1 && verbWord) {
      var subj = words.slice(0, verbIdx).join(' ').replace(/[^a-zA-Z\u4e00-\u9fff\s]/g, '').trim();
      var obj = words.slice(verbIdx + 1).join(' ').replace(/[^a-zA-Z\u4e00-\u9fff\s]/g, '').trim();
      if (subj && obj && subj.length > 1 && obj.length > 1) {
        var sn = null;
        for (var ri = 0; ri < root.children.length; ri++) {
          if (root.children[ri].label.toLowerCase() === subj.toLowerCase()) {
            sn = root.children[ri];
            break;
          }
        }
        if (!sn) {
          nid++;
          sn = {id:'n'+nid, label:subj, children:[], expanded:true};
          root.children.push(sn);
        }
        nid++;
        sn.children.push({id:'n'+nid, label:obj, children:[], expanded:true, rel:verbWord});
      }
    } else {
      // No verb — extract capitalized entities
      var ents = s.match(/\b[A-Z][a-z]+(?:\s[A-Z][a-z]+)*/g);
      if (ents && ents.length > 0) {
        var mainEnt = ents[0];
        var mn = null;
        for (var ri2 = 0; ri2 < root.children.length; ri2++) {
          if (root.children[ri2].label === mainEnt) { mn = root.children[ri2]; break; }
        }
        if (!mn) {
          nid++;
          mn = {id:'n'+nid, label:mainEnt, children:[], expanded:true};
          root.children.push(mn);
        }
        for (var ej = 1; ej < ents.length; ej++) {
          nid++;
          mn.children.push({id:'n'+nid, label:ents[ej], children:[], expanded:true, rel:'related'});
        }
      }
    }
  }

  offX = -80;
  drawTree();
  trackEvent('gen', {tool:'mg'});
}

// ─── Examples ──────────────────────────────────────────
function loadEx(idx) {
  var examples = [
    'Elon Musk founded Tesla and SpaceX. Tesla launched Model 3. SpaceX developed Starship. Google acquired DeepMind. Microsoft invested in OpenAI.',
    '小明创建了科技公司。公司发布了新产品。团队开发了人工智能。公司收购了创业企业。'
  ];
  document.getElementById('txt').value = examples[idx];
  genTree();
}

function clearAll() {
  root = {id:'r', label:'Source', children:[], expanded:true};
  nid = 0;
  offX = 0;
  offY = 0;
  document.getElementById('txt').value = '';
  drawTree();
}

// ─── Export ────────────────────────────────────────────
var exportFmt = 'png';

function showExport() { document.getElementById('exportModal').classList.add('on'); }
function hideExp() { document.getElementById('exportModal').classList.remove('on'); }

function pickFmt(f) {
  exportFmt = f;
  var btns = document.querySelectorAll('.fb');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('on', btns[i].dataset.f === f);
  }
}

document.getElementById('exportModal').addEventListener('click', function(e) {
  if (e.target.id === 'exportModal') hideExp();
});

function doExp() {
  hideExp();
  var link = document.createElement('a');
  if (exportFmt === 'png') {
    link.download = 'galaxymind.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } else if (exportFmt === 'jpg') {
    link.download = 'galaxymind.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.9);
    link.click();
  } else if (exportFmt === 'pdf') {
    var imgData = canvas.toDataURL('image/png');
    var w = window.open('', '_blank');
    w.document.write('<html><head><title>GalaxyMind</title><style>body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;}img{max-width:100%;max-height:100%;}</style></head><body><img src="'+imgData+'" onload="window.print()"></body></html>');
    w.document.close();
  } else if (exportFmt === 'docx') {
    var htmlText = flattenTree(root, 0);
    var fullHtml = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>GalaxyMind</title><style>body{font-family:Inter,sans-serif;padding:20px;}h1{color:#7c3aed;font-size:18px;}.l0{margin-left:0;font-weight:bold;font-size:16px;margin-top:16px;}.l1{margin-left:24px;font-size:14px;margin-top:8px;}.l2{margin-left:48px;font-size:13px;margin-top:4px;color:#555;}.l3{margin-left:72px;font-size:12px;margin-top:4px;color:#777;}.r{color:#7c3aed;font-size:11px;margin-left:24px;}</style></head><body><h1>GalaxyMind Mind Map</h1>'+htmlText+'<p style="margin-top:40px;color:#999;font-size:10px;">Generated by GalaxyMind</p></body></html>';
    var blob = new Blob([fullHtml], {type:'application/msword'});
    link.download = 'galaxymind.doc';
    link.href = URL.createObjectURL(blob);
    link.click();
  }
  trackEvent('exp_'+exportFmt, {tool:'mg'});
}

function flattenTree(node, level) {
  if (!node || (node.id === 'r' && level === 0)) {
    var h = '';
    if (node.children) for (var i = 0; i < node.children.length; i++) h += flattenTree(node.children[i], level + 1);
    return h;
  }
  var h = '<div class="l'+Math.min(level,3)+'">- '+node.label+'</div>';
  if (node.rel) h += '<div class="r">-> '+node.rel+'</div>';
  if (node.children && node.expanded !== false) for (var i = 0; i < node.children.length; i++) h += flattenTree(node.children[i], level + 1);
  return h;
}

// ─── View Switch ───────────────────────────────────────
var viewMode = '2d';

function switchView(mode) {
  if (mode === viewMode) return;
  viewMode = mode;
  
  document.getElementById('v2d').className = mode === '2d' ? 'active' : '';
  document.getElementById('v3d').className = mode === '3d' ? 'active' : '';
  
  if (mode === '3d') {
    canvas.style.display = 'none';
    var frame = document.getElementById('threeFrame');
    if (!frame) {
      frame = document.createElement('div');
      frame.id = 'threeFrame';
      frame.style.cssText = 'position:fixed;top:50px;left:0;right:0;bottom:0;z-index:20;background:#0a0a1a;';
      frame.innerHTML = '<iframe src="/index-3d-backup.html" style="width:100%;height:100%;border:none;"></iframe>';
      document.body.appendChild(frame);
    }
    frame.style.display = 'block';
  } else {
    canvas.style.display = 'block';
    var f = document.getElementById('threeFrame');
    if (f) f.style.display = 'none';
  }
}

// ─── Keyboard ──────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') hideEditor();
  if (e.key === 'Enter' && document.getElementById('editor').style.display === 'block') saveEd();
});

document.getElementById('txt').value = 'Elon Musk founded Tesla and SpaceX. Tesla launched Model 3.';
genTree();
